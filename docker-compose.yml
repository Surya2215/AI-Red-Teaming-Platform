services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: redteam
      POSTGRES_USER: redteam
      POSTGRES_PASSWORD: redteam
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U redteam -d redteam"]
      interval: 5s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: redteam
      RABBITMQ_DEFAULT_PASS: redteam
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  valkey:
    image: valkey/valkey:7.2-alpine
    ports:
      - "6379:6379"
    volumes:
      - valkey_data:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://redteam:redteam@postgres:5432/redteam
      CELERY_BROKER_URL: amqp://redteam:redteam@rabbitmq:5672//
      CELERY_RESULT_BACKEND: redis://valkey:6379/0
      CELERY_TASK_DEFAULT_QUEUE: tool-scans
    ports:
      - "8000:8000"
    volumes:
      - ./logs:/app/logs
      - ./reports:/app/reports
      - ./targets:/app/targets
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      valkey:
        condition: service_healthy
    command: uvicorn core.api:app --host 0.0.0.0 --port 8000

  tool-worker:
    build: .
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://redteam:redteam@postgres:5432/redteam
      CELERY_BROKER_URL: amqp://redteam:redteam@rabbitmq:5672//
      CELERY_RESULT_BACKEND: redis://valkey:6379/0
      CELERY_TASK_DEFAULT_QUEUE: tool-scans
    volumes:
      - ./logs:/app/logs
      - ./reports:/app/reports
      - ./targets:/app/targets
    depends_on:
      rabbitmq:
        condition: service_healthy
      valkey:
        condition: service_healthy
    command: celery -A engine.tool_tasks.celery_app worker --loglevel=INFO --queues=tool-scans --concurrency=1

  frontend:
    build:
      context: ./frontend
    env_file:
      - .env
    environment:
      - VITE_API_BASE=http://localhost:8000
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --host 0.0.0.0

volumes:
  postgres_data:
  rabbitmq_data:
  valkey_data:

