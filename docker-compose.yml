services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: redteam
      POSTGRES_USER: redteam
      POSTGRES_PASSWORD: redteam
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U redteam -d redteam"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://redteam:redteam@postgres:5432/redteam
    ports:
      - "8000:8000"
    volumes:
      - ./logs:/app/logs
      - ./reports:/app/reports
      - ./targets:/app/targets
    depends_on:
      postgres:
        condition: service_healthy
    command: uvicorn core.api:app --host 0.0.0.0 --port 8000

  frontend:
    build:
      context: ./frontend
    env_file:
      - .env
    environment:
      - VITE_API_BASE=http://localhost:8000
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --host 0.0.0.0

volumes:
  postgres_data:

